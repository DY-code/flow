<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['Menlo', 'Monaco', 'Courier New', 'monospace'],
            },
            typography: ({ theme }) => ({
              DEFAULT: {
                css: {
                  '--tw-prose-body': 'var(--color-fg-default)',
                  '--tw-prose-headings': 'var(--color-fg-default)',
                  '--tw-prose-lead': 'var(--color-fg-muted)',
                  '--tw-prose-links': 'var(--color-accent)',
                  '--tw-prose-bold': 'var(--color-fg-default)',
                  '--tw-prose-counters': 'var(--color-fg-muted)',
                  '--tw-prose-bullets': 'var(--color-border)',
                  '--tw-prose-hr': 'var(--color-border)',
                  '--tw-prose-quotes': 'var(--color-fg-muted)',
                  '--tw-prose-quote-borders': 'var(--color-border)',
                  '--tw-prose-captions': 'var(--color-fg-muted)',
                  '--tw-prose-code': 'var(--color-fg-default)',
                  '--tw-prose-pre-code': 'var(--color-fg-default)',
                  '--tw-prose-pre-bg': 'var(--color-bg-subtle)',
                  maxWidth: 'none',
                  color: 'var(--tw-prose-body)',
                  // Optimize preview typography for density
                  p: {
                    wordBreak: 'break-all', 
                    overflowWrap: 'anywhere',
                    textAlign: 'justify' 
                  },
                  li: {
                    wordBreak: 'break-all',
                    overflowWrap: 'anywhere',
                    textAlign: 'justify' 
                  },
                  h1: {
                    fontWeight: '600',
                    paddingBottom: '0.3em',
                    borderBottom: '1px solid var(--color-border)',
                    marginTop: '1.5em',
                    marginBottom: '1rem',
                  },
                  h2: {
                    fontWeight: '600',
                    paddingBottom: '0.3em',
                    borderBottom: '1px solid var(--color-border)',
                    marginTop: '1.5em',
                    marginBottom: '1rem',
                  },
                  h3: {
                    fontWeight: '600',
                    marginTop: '1.5em',
                    marginBottom: '1rem',
                  },
                  'h4, h5, h6': {
                    fontWeight: '600',
                    marginTop: '1.5em',
                    marginBottom: '1rem',
                  },
                  blockquote: {
                    fontStyle: 'normal',
                    borderLeftWidth: '0.25rem',
                    color: 'var(--tw-prose-quotes)',
                  },
                  'code::before': { content: '""' },
                  'code::after': { content: '""' },
                  code: {
                    backgroundColor: 'var(--color-bg-code)',
                    padding: '0.2em 0.4em',
                    borderRadius: '6px',
                    fontWeight: '400',
                    fontSize: '85%',
                    wordBreak: 'break-word', // Code should try to keep words
                  },
                  pre: {
                    backgroundColor: 'var(--color-bg-subtle)',
                    border: '1px solid var(--color-border)',
                    marginTop: '1rem',
                    marginBottom: '1rem',
                    wordBreak: 'break-all',
                    whiteSpace: 'pre-wrap'
                  },
                  a: {
                    textDecoration: 'none',
                    fontWeight: '500',
                    '&:hover': {
                      textDecoration: 'underline',
                    }
                  },
                  img: {
                    borderRadius: '6px',
                  },
                  table: {
                    marginTop: '1rem',
                    marginBottom: '1rem',
                  },
                  'thead th': {
                    textAlign: 'left',
                  }
                },
              },
            }),
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-fg-default: #24292f;
        --color-fg-muted: #57606a;
        --color-bg-default: #ffffff;
        --color-bg-subtle: #f6f8fa;
        --color-bg-code: rgba(175, 184, 193, 0.2);
        --color-border: #d0d7de;
        --color-accent: #0969da;
      }
      
      .dark {
        --color-fg-default: #e4e4e7; /* zinc-200 */
        --color-fg-muted: #a1a1aa; /* zinc-400 */
        --color-bg-default: #09090b; /* zinc-950 */
        --color-bg-subtle: #18181b; /* zinc-900 */
        --color-bg-code: rgba(63, 63, 70, 0.4); /* zinc-700 alpha */
        --color-border: #27272a; /* zinc-800 */
        --color-accent: #60a5fa; /* blue-400 */
      }

      body { font-family: 'Inter', sans-serif; }
      
      /* Ensure underline tags are visible */
      .prose u, u { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
      
      .dark ::-webkit-scrollbar-thumb { background: #3f3f46; } /* zinc-700 */
      .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; } /* zinc-600 */

      /* Prism / Editor Syntax Highlighting */
      /* FIXED: Removed font-weight: bold to prevent cursor misalignment */
      .token.heading { font-weight: normal; color: var(--color-accent); }
      .token.bold { font-weight: normal; color: var(--color-fg-default); background-color: rgba(0,0,0,0.05); } 
      .dark .token.bold { background-color: rgba(255,255,255,0.1); }
      
      .token.italic { font-style: italic; }
      .token.underline { text-decoration: underline; }
      .token.strike { text-decoration: line-through; opacity: 0.7; }
      .token.list { color: var(--color-fg-muted); }
      .token.quote { color: var(--color-fg-muted); font-style: italic; }
      .token.link { color: var(--color-accent); text-decoration: underline; }
      .token.url { color: var(--color-fg-muted); }
      .token.code { 
        font-family: 'Menlo', 'Monaco', 'Courier New', monospace; 
        background: var(--color-bg-code); 
        border-radius: 3px;
        font-size: 0.9em;
      }
      
      /* Editor Overrides */
      .prism-editor-wrapper textarea, 
      .prism-editor-wrapper pre { 
          outline: none !important; 
      }
      
      /* Fix alignment issues between textarea and pre */
      /* Use standard word-break only */
      .prism-editor-wrapper textarea, 
      .prism-editor-wrapper pre {
          word-break: break-all !important; 
          white-space: pre-wrap !important;
          overflow-wrap: normal !important; 
          line-break: auto !important;
          font-variant-ligatures: none !important;
      }
      
      /* Ensure Preview mode behaves consistently (Justify is fine here) */
      .prose p, .prose li {
          text-align: justify;
          word-break: break-all;
          line-break: anywhere;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "rehype-raw": "https://esm.sh/rehype-raw@7?bundle",
    "react-simple-code-editor": "https://esm.sh/react-simple-code-editor@0.14.1",
    "prismjs": "https://esm.sh/prismjs@1.29.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
